<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudContact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
        }

        h1 {
            text-align: center;
            color: #232f3e;
            margin-bottom: 8px;
            font-size: 28px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #ff9900;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff9900;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #e68a00;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .success {
            display: none;
            text-align: center;
            padding: 20px;
            background: #d4edda;
            border-radius: 8px;
            color: #155724;
            margin-top: 20px;
            font-weight: 600;
        }

        .error {
            display: none;
            text-align: center;
            padding: 20px;
            background: #f8d7da;
            border-radius: 8px;
            color: #721c24;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ CloudContact</h1>
        <p class="subtitle">Send me a message and I'll get back to you!</p>

        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="Enter your name" />
        </div>

        <div class="form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Write your message here..."></textarea>
        </div>

        <button id="submitBtn" onclick="submitForm()">Send Message</button>

        <div class="success" id="success">
            ✅ Message sent successfully! I'll get back to you soon.
        </div>

        <div class="error" id="error">
            ❌ Something went wrong. Please try again.
        </div>
    </div>

    <script>
        async function submitForm() {
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;

            
            if (!name || !email || !message) {
                alert('Please fill in all fields!');
                return;
            }

            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            
            try {
                const response = await fetch('https://95w1ixvu4l.execute-api.us-east-1.amazonaws.com/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, message })
                });

                
                if (response.ok) {
                    document.getElementById('success').style.display = 'block';
                    document.getElementById('error').style.display = 'none';
                    btn.textContent = 'Sent!';
                } else {
                    throw new Error('Server error');
                }

            } catch (error) {
                // Step 6 - Show error message if something went wrong
                document.getElementById('error').style.display = 'block';
                document.getElementById('success').style.display = 'none';
                btn.disabled = false;
                btn.textContent = 'Send Message';
            }
        }
    </script>
</body>
</html>
